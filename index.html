<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen gelukt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 90%;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h2 { color: #1e293b; font-size: 20px; margin-bottom: 8px; }
    p  { color: #64748b; font-size: 14px; line-height: 1.5; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">Bezig met inloggen…</h2>
  <p  id="msg">Even geduld, je wordt teruggestuurd naar de app.</p>
</div>

<script>
  function setUI(icon, title, msg, isError) {
    document.getElementById('icon').textContent  = icon;
    document.getElementById('title').textContent = title;
    document.getElementById('msg').textContent   = msg;
    if (isError) document.getElementById('msg').classList.add('error');
  }

  try {
    var params = new URLSearchParams(window.location.search);
    var code   = params.get('code');
    var error  = params.get('error');
    var state  = params.get('state');

    if (error) {
      setUI('❌', 'Inloggen mislukt',
        'Fout: ' + (params.get('error_description') || error), true);

    } else if (code) {
      // Stuur de code terug naar het opener venster (de app)
      if (window.opener) {
        window.opener.postMessage(
          { type: 'OAUTH_CODE', code: code, state: state },
          '*'
        );
        setUI('✅', 'Inloggen gelukt!',
          'Je kunt dit venster sluiten. De app wordt geladen.');
        setTimeout(function() { window.close(); }, 1500);
      } else {
        setUI('⚠️', 'Venster kon niet worden gesloten',
          'Kopieer deze code handmatig: ' + code, false);
      }

    } else {
      setUI('❓', 'Geen code ontvangen',
        'Controleer de Redirect URI in je Azure App Registration.', true);
    }

  } catch(e) {
    setUI('❌', 'Fout', e.message, true);
  }
</script>
</body>
</html>
